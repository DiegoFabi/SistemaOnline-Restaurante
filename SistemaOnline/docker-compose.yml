services:
  web:
    container_name: sistema_web_container
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__SQLCadena=Server=db;Database=SistemaDB;User Id=sa;Password=Password_12345;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: sistema_db_container
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password_12345
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s